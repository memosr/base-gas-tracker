<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-s" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glow-s" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0052FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0052FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pump-s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a6bff"/>
      <stop offset="100%" stop-color="#0039cc"/>
    </linearGradient>
    <filter id="shadow-s">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0052FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bg-s)"/>

  <!-- Glow -->
  <ellipse cx="100" cy="100" rx="65" ry="65" fill="url(#glow-s)"/>

  <!-- Gas pump (scaled) -->
  <g filter="url(#shadow-s)" transform="translate(100,100)">
    <rect x="-24" y="-36" width="40" height="60" rx="4" fill="url(#pump-s)"/>
    <rect x="-20" y="-32" width="32" height="18" rx="2" fill="#0a0e1a" opacity="0.8"/>
    <rect x="-17" y="-29" width="16" height="2" rx="1" fill="#0052FF" opacity="0.9"/>
    <rect x="-17" y="-25" width="22" height="2" rx="1" fill="#0052FF" opacity="0.6"/>
    <rect x="-17" y="-21" width="12" height="2" rx="1" fill="#0052FF" opacity="0.4"/>
    <rect x="16" y="-28" width="4" height="16" rx="2" fill="url(#pump-s)"/>
    <rect x="12" y="-14" width="12" height="6" rx="3" fill="#0039cc"/>
    <path d="M 16 -10 Q 26 -4 22 8" stroke="#1a6bff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-26" y="24" width="44" height="6" rx="2" fill="#0039cc"/>
    <circle cx="8" cy="-6" r="3" fill="#22c55e"/>
  </g>

  <!-- BASE label -->
  <text x="100" y="166" font-family="Arial, sans-serif" font-weight="800" font-size="14" fill="#0052FF" opacity="0.7" text-anchor="middle">BASE</text>
</svg>
