<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0c1122"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052FF"/>
      <stop offset="100%" stop-color="#0039cc"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0052FF"/>
      <stop offset="100%" stop-color="#0052FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0052FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0052FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="icon-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0052FF" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-og)"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#center-glow)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Horizontal accent line (top) -->
  <rect x="0" y="8" width="1200" height="1" fill="url(#accent-line)" opacity="0.4"/>

  <!-- Gas pump icon (large, centered left) -->
  <g filter="url(#icon-shadow)" transform="translate(220, 195)">
    <rect x="-55" y="-90" width="100" height="150" rx="12" fill="#0052FF"/>
    <rect x="-44" y="-78" width="78" height="48" rx="6" fill="#0a0e1a" opacity="0.85"/>
    <rect x="-36" y="-68" width="40" height="8" rx="3" fill="#0052FF"/>
    <rect x="-36" y="-54" width="58" height="8" rx="3" fill="#0052FF" opacity="0.6"/>
    <rect x="-36" y="-40" width="28" height="8" rx="3" fill="#0052FF" opacity="0.35"/>
    <rect x="45" y="-68" width="18" height="42" rx="9" fill="#1a6bff"/>
    <rect x="30" y="-30" width="36" height="14" rx="7" fill="#0039cc"/>
    <path d="M 46 -18 Q 72 4 60 36" stroke="#1a6bff" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="-62" y="60" width="116" height="18" rx="6" fill="#0039cc" opacity="0.9"/>
    <circle cx="22" cy="14" r="10" fill="#22c55e"/>
    <circle cx="22" cy="14" r="18" fill="#22c55e" opacity="0.2"/>
  </g>

  <!-- Main title -->
  <text x="370" y="258" font-family="Arial, sans-serif" font-weight="900" font-size="88" fill="#e8eaed">Base Gas</text>
  <text x="370" y="358" font-family="Arial, sans-serif" font-weight="900" font-size="88" fill="#0052FF">Tracker</text>

  <!-- Subtitle -->
  <text x="370" y="415" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#9ca3af">Real-time gas tracker for Base mainnet</text>

  <!-- Feature pills -->
  <g transform="translate(370, 450)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="rgba(0,82,255,0.15)" stroke="#0052FF" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="23" font-family="Arial" font-size="16" fill="#0052FF" text-anchor="middle" font-weight="600">Live Prices</text>

    <rect x="146" y="0" width="120" height="36" rx="18" fill="rgba(0,82,255,0.15)" stroke="#0052FF" stroke-width="1" stroke-opacity="0.4"/>
    <text x="206" y="23" font-family="Arial" font-size="16" fill="#0052FF" text-anchor="middle" font-weight="600">24h Chart</text>

    <rect x="282" y="0" width="154" height="36" rx="18" fill="rgba(0,82,255,0.15)" stroke="#0052FF" stroke-width="1" stroke-opacity="0.4"/>
    <text x="359" y="23" font-family="Arial" font-size="16" fill="#0052FF" text-anchor="middle" font-weight="600">TX Calculator</text>
  </g>

  <!-- "Built on Base" badge (bottom right) -->
  <g transform="translate(970, 510)">
    <rect x="0" y="0" width="188" height="52" rx="14" fill="url(#badge-grad)"/>
    <!-- Base circle logo mark -->
    <circle cx="30" cy="26" r="16" fill="white" opacity="0.15"/>
    <circle cx="30" cy="26" r="10" fill="white" opacity="0.9"/>
    <circle cx="30" cy="26" r="5" fill="#0052FF"/>
    <text x="108" y="32" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white" text-anchor="middle">Built on Base</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#0052FF" opacity="0.7" rx="0"/>
</svg>
